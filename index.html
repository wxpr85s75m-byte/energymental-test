<!DOCTYPE html>
<html lang="ru">
<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.13/html-to-image.min.js" integrity="sha512-iZ2ORl595Wx6miw+GuadDet4WQbdSWS3JLMoNfY8cRGoEFy6oT3G9IbcrBeL6AfkgpA51ETt/faX6yLV+/gFJg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script>
      (function() {
        const originalConsole = window.console;
        window.console = {
          log: (...args) => {
            originalConsole.log(...args);
            window.parent.postMessage({ type: 'console', message: args.join(' ') }, '*');
          },
          error: (...args) => {
            originalConsole.error(...args);
            window.parent.postMessage({ type: 'console', message: 'Error: ' + args.join(' ') }, '*');
          },
          warn: (...args) => {
            originalConsole.warn(...args);
            window.parent.postMessage({ type: 'console', message: 'Warning: ' + args.join(' ') }, '*');
          }
        };

        let requestId = 0;
        let callbacksMap = new Map();
        let streamControllers = new Map();
        
        window.claude = {
          complete: (prompt) => {
            return new Promise((resolve, reject) => {
              const id = requestId++;
              callbacksMap.set(id, { resolve, reject });
              window.parent.postMessage({ type: 'claudeComplete', id, prompt }, '*');
            });
          }
        };

        window.storage = {
          get: (key, shared = false) => {
            return new Promise((resolve, reject) => {
              const id = requestId++;
              callbacksMap.set(id, { resolve, reject });
              window.parent.postMessage({ type: 'storageGet', id, key, shared }, '*');
            });
          },
          set: (key, value, shared = false) => {
            return new Promise((resolve, reject) => {
              const id = requestId++;
              callbacksMap.set(id, { resolve, reject });
              window.parent.postMessage({ type: 'storageSet', id, key, value, shared }, '*');
            });
          },
          delete: (key, shared = false) => {
            return new Promise((resolve, reject) => {
              const id = requestId++;
              callbacksMap.set(id, { resolve, reject });
              window.parent.postMessage({ type: 'storageDelete', id, key, shared }, '*');
            });
          },
          list: (prefix, shared = false) => {
            return new Promise((resolve, reject) => {
              const id = requestId++;
              callbacksMap.set(id, { resolve, reject });
              window.parent.postMessage({ type: 'storageList', id, prefix, shared }, '*');
            });
          }
        };

        let pendingBlobs = new Map();
        URL.createObjectURL = (blob) => {
          // Store the blob and create an ID and URL for it
          const blobId = `blob-${Date.now()}-${Math.random()}`;
          pendingBlobs.set(blobId, blob);
          return `blob-request://${blobId}`;
        };

        URL.revokeObjectURL = (url) => {
          // Remove the blob from our store
          const blobId = url.replace("blob-request://", "");
          pendingBlobs.delete(blobId);
        };

        const getBlobFromURL = (url) => {
          const blobId = url.replace("blob-request://", "");
          return pendingBlobs.get(blobId);
        };

        // Override global fetch with streaming support
        window.fetch = (url, init = {}) => {
          return new Promise((resolve, reject) => {
            const id = requestId++;
            const channelId = `fetch-${id}-${Date.now()}`;
            
            callbacksMap.set(id, { 
              resolve: (response) => {
                // Create a ReadableStream for the response body
                const stream = new ReadableStream({
                  start(controller) {
                    streamControllers.set(channelId, controller);
                  },
                  cancel() {
                    streamControllers.delete(channelId);
                  }
                });
                
                // Create and return the Response with the stream
                resolve(new Response(stream, {
                  status: response.status,
                  statusText: response.statusText,
                  headers: response.headers
                }));
              },
              reject,
              channelId
            });
            
            window.parent.postMessage({
              type: 'proxyFetch',
              id,
              url,
              init,
              channelId
            }, '*');
          });
        };

        window.addEventListener('message', async (event) => {
          if (event.data.type === 'takeScreenshot') {
            const rootElement = document.getElementById('artifacts-component-root-html');
            if (!rootElement) {
              window.parent.postMessage({
                type: 'screenshotError',
                error: new Error('Root element not found'),
              }, '*');
            }
            const screenshot = await htmlToImage.toPng(rootElement, {
              imagePlaceholder:
                "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAAAXNSR0IArs4c6QAAAA1JREFUGFdjePDgwX8ACOQDoNsk0PMAAAAASUVORK5CYII=",
            });
            window.parent.postMessage({
              type: 'screenshotData',
              data: screenshot,
            }, '*');
          } else if (event.data.type === 'claudeComplete') {
            const callback = callbacksMap.get(event.data.id);
            if (event.data.error) {
              callback.reject(new Error(event.data.error));
            } else {
              callback.resolve(event.data.completion);
            }
            callbacksMap.delete(event.data.id);
          } else if (event.data.type === 'proxyFetchResponse') {
            const callback = callbacksMap.get(event.data.id);
            if (event.data.error) {
              callback.reject(new Error(event.data.error));
              callbacksMap.delete(event.data.id);
            } else {
              // Initial response with headers, status, etc.
              callback.resolve({
                status: event.data.status,
                statusText: event.data.statusText,
                headers: event.data.headers
              });
              // Don't delete the callback yet if streaming
              if (!event.data.body) {
                callbacksMap.delete(event.data.id);
              }
            }
          } else if (event.data.type === 'proxyFetchStream') {
            // Handle streaming data chunks
            const controller = streamControllers.get(event.data.channelId);
            if (controller) {
              if (event.data.error) {
                controller.error(new Error(event.data.error));
                streamControllers.delete(event.data.channelId);
              } else if (event.data.done) {
                controller.close();
                streamControllers.delete(event.data.channelId);
                // Clean up the callback
                const callback = Array.from(callbacksMap.entries()).find(
                  ([_, value]) => value.channelId === event.data.channelId
                );
                if (callback) {
                  callbacksMap.delete(callback[0]);
                }
              } else if (event.data.chunk) {
                controller.enqueue(new Uint8Array(event.data.chunk));
              }
            }
          } else if (event.data.type === 'storageGet') {
            const callback = callbacksMap.get(event.data.id);
            if (event.data.error) {
              callback.reject(new Error(event.data.error));
            } else {
              callback.resolve(event.data.result);
            }
            callbacksMap.delete(event.data.id);
          } else if (event.data.type === 'storageSet') {
            const callback = callbacksMap.get(event.data.id);
            if (event.data.error) {
              callback.reject(new Error(event.data.error));
            } else {
              callback.resolve(event.data.result);
            }
            callbacksMap.delete(event.data.id);
          } else if (event.data.type === 'storageDelete') {
            const callback = callbacksMap.get(event.data.id);
            if (event.data.error) {
              callback.reject(new Error(event.data.error));
            } else {
              callback.resolve(event.data.result);
            }
            callbacksMap.delete(event.data.id);
          } else if (event.data.type === 'storageList') {
            const callback = callbacksMap.get(event.data.id);
            if (event.data.error) {
              callback.reject(new Error(event.data.error));
            } else {
              callback.resolve(event.data.result);
            }
            callbacksMap.delete(event.data.id);
          }
        });

        window.addEventListener('click', (event) => {
          const isEl = event.target instanceof HTMLElement;
          if (!isEl) return;
    
          // find ancestor links
          const linkEl = event.target.closest("a");
          if (!linkEl || !linkEl.href) return;
    
          event.preventDefault();
          event.stopImmediatePropagation();
    
          if (linkEl.href.startsWith("blob-request:")) {
            const blob = getBlobFromURL(linkEl.href);
            if (!blob) return;
            void blob.arrayBuffer().then((data) => {
              window.parent.postMessage({
                type: "downloadFile",
                filename: linkEl.download,
                data,
                mimeType: blob.type || "application/octet-stream",
              });
            });
          } else if (linkEl.href.startsWith("data:")) {
            const [header, base64Data] = linkEl.href.split(",");
            const mimeMatch = header.match(/data:([^;]+)/);
            const mimeType = mimeMatch ? mimeMatch[1] : "application/octet-stream";
            const binaryString = atob(base64Data);
            const data = Uint8Array.from(binaryString, (c) =>
              c.charCodeAt(0),
            ).buffer;
            window.parent.postMessage({
              type: "downloadFile",
              filename: linkEl.download,
              data,
              mimeType,
            });
          } else {
            let linkUrl;
            try {
              linkUrl = new URL(linkEl.href);
            } catch (error) {
              return;
            }
    
            if (linkUrl.hostname === window.location.hostname) return;
      
            window.parent.postMessage({
              type: 'openExternal',
              href: linkEl.href,
            }, '*');
          }
      });

        const originalOpen = window.open;
        window.open = function (url) {
          window.parent.postMessage({
            type: "openExternal",
            href: url,
          }, "*");
        };

        window.addEventListener('error', (event) => {
          window.parent.postMessage({ type: 'console', message: 'Uncaught Error: ' + event.message }, '*');
        });
      })();
    </script>
  
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Три Уровня · Диагностика</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #141414;
    --bg2: #1c1c1c;
    --card: #202020;
    --card2: #262626;
    --border: #2e2e2e;
    --crimson: #8B1A2F;
    --crimson-light: #a52840;
    --gold: #C8A96E;
    --gold-light: #d4b87a;
    --text: #e8e0d8;
    --text-muted: #9a9090;
    --text-dim: #5a5050;
    --accent-pink: #c47a8a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Montserrat', sans-serif;
    font-weight: 300;
    line-height: 1.7;
    min-height: 100vh;
  }

  /* ── SCREENS ── */
  .screen { display: none; }
  .screen.active { display: block; }

  /* ── COVER ── */
  .cover {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 60px 30px;
    position: relative;
    overflow: hidden;
    background: var(--bg);
  }

  .cover::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 60% 50% at 50% 35%, rgba(139,26,47,0.2) 0%, transparent 70%);
    pointer-events: none;
  }

  .logo-circle {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 40%, #6b1525, #2a0a10);
    border: 1.5px solid rgba(139,26,47,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 36px;
    box-shadow: 0 0 50px rgba(139,26,47,0.35);
    overflow: hidden;
    position: relative;
    z-index: 1;
  }

  .logo-circle img {
    width: 90px;
    height: 90px;
    object-fit: contain;
  }

  .module-tag {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 3px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 20px;
    position: relative;
    z-index: 1;
  }

  .cover-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(44px, 9vw, 72px);
    font-weight: 300;
    color: var(--text);
    line-height: 1.05;
    margin-bottom: 12px;
    position: relative;
    z-index: 1;
  }

  .cover-subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(22px, 4vw, 32px);
    font-weight: 300;
    font-style: italic;
    color: var(--gold);
    margin-bottom: 28px;
    position: relative;
    z-index: 1;
  }

  .divider {
    width: 50px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--crimson), transparent);
    margin: 0 auto 28px;
    position: relative;
    z-index: 1;
  }

  .cover-desc {
    font-size: 13px;
    color: var(--text-muted);
    max-width: 340px;
    line-height: 1.9;
    font-style: italic;
    position: relative;
    z-index: 1;
  }

  .cover-meta {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 14px;
    letter-spacing: 1px;
    position: relative;
    z-index: 1;
  }

  .start-btn {
    margin-top: 44px;
    padding: 15px 48px;
    background: transparent;
    border: 1px solid var(--crimson);
    color: var(--text);
    font-family: 'Montserrat', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 30px;
    transition: all 0.3s ease;
    position: relative;
    z-index: 1;
  }

  .start-btn:hover, .start-btn:active {
    background: var(--crimson);
    box-shadow: 0 0 24px rgba(139,26,47,0.45);
  }

  /* ── TEST HEADER ── */
  .test-header {
    padding: 32px 24px 16px;
    text-align: center;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
    border-bottom: 1px solid var(--border);
  }

  .progress-label {
    font-size: 9px;
    letter-spacing: 2.5px;
    color: var(--crimson);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .progress-bar {
    width: 100%;
    max-width: 420px;
    margin: 0 auto;
    height: 2px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--crimson), var(--gold));
    border-radius: 2px;
    transition: width 0.4s ease;
    width: 0%;
  }

  .question-counter {
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 8px;
    letter-spacing: 1px;
  }

  /* ── QUESTION ── */
  .question-wrap {
    padding: 48px 24px 100px;
    max-width: 500px;
    margin: 0 auto;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .question-wrap { animation: fadeUp 0.38s ease; }

  .question-num {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .question-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(24px, 5.5vw, 34px);
    font-weight: 300;
    line-height: 1.35;
    color: var(--text);
    margin-bottom: 52px;
  }

  .answer-btns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  .answer-btn {
    padding: 22px 16px;
    border-radius: 16px;
    border: 1px solid var(--border);
    background: var(--card);
    cursor: pointer;
    transition: background 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    text-align: center;
    -webkit-tap-highlight-color: transparent;
  }

  .answer-btn .btn-icon {
    font-size: 24px;
    display: block;
    margin-bottom: 10px;
    color: var(--text-muted);
  }

  .answer-btn .btn-label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    font-weight: 500;
  }

  .answer-btn.yes.flash {
    background: rgba(200,169,110,0.12);
    border-color: var(--gold);
  }
  .answer-btn.yes.flash .btn-icon,
  .answer-btn.yes.flash .btn-label { color: var(--gold); }

  .answer-btn.no.flash {
    background: rgba(139,26,47,0.12);
    border-color: var(--crimson);
  }
  .answer-btn.no.flash .btn-icon,
  .answer-btn.no.flash .btn-label { color: var(--accent-pink); }

  /* ── RESULTS ── */
  .results-wrap {
    padding: 0 0 80px;
    max-width: 500px;
    margin: 0 auto;
    animation: fadeUp 0.45s ease;
  }

  .results-cover {
    padding: 56px 24px 36px;
    text-align: center;
    position: relative;
    overflow: hidden;
    background: var(--bg);
  }

  .results-cover::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 70% 55% at 50% 30%, rgba(139,26,47,0.22) 0%, transparent 70%);
    pointer-events: none;
  }

  .results-tag {
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 14px;
    position: relative;
    z-index: 1;
  }

  .results-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(36px, 8vw, 52px);
    font-weight: 300;
    line-height: 1.1;
    margin-bottom: 8px;
    position: relative;
    z-index: 1;
  }

  .results-subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-style: italic;
    color: var(--gold);
    margin-bottom: 8px;
    position: relative;
    z-index: 1;
  }

  /* ── SCORES ── */
  .scores-section {
    padding: 8px 24px 0;
  }

  .section-label {
    font-size: 9px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 14px;
    padding-top: 24px;
  }

  .score-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px 20px;
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    gap: 16px;
    margin-bottom: 10px;
  }

  .score-card.leading {
    border-color: var(--gold);
    background: linear-gradient(135deg, rgba(200,169,110,0.08), var(--card));
  }

  .score-label-top {
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--crimson);
    font-weight: 500;
    margin-bottom: 3px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .star-badge {
    font-size: 11px;
    color: var(--gold);
  }

  .score-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 19px;
    font-weight: 400;
    color: var(--text);
  }


  .score-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 17px;
    font-weight: 300;
    color: var(--text);
    margin-top: 2px;
    margin-bottom: 6px;
  }

  .score-bar-wrap {
    margin-top: 8px;
    height: 2px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .score-bar-fill {
    height: 100%;
    border-radius: 2px;
    background: linear-gradient(90deg, var(--crimson), var(--gold));
  }

  .score-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 30px;
    font-weight: 300;
    color: var(--gold);
    white-space: nowrap;
    text-align: right;
    line-height: 1;
  }

  .score-total {
    font-size: 10px;
    color: var(--text-dim);
    text-align: right;
  }

  /* ── FOG ALERT ── */
  .fog-alert {
    margin: 20px 24px 0;
    padding: 20px;
    border-radius: 16px;
    background: linear-gradient(135deg, rgba(139,26,47,0.18), rgba(30,18,18,0.9));
    border: 1px solid rgba(139,26,47,0.4);
  }

  .fog-alert-tag {
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent-pink);
    font-weight: 500;
    margin-bottom: 8px;
  }

  .fog-alert-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 19px;
    font-weight: 400;
    color: var(--text);
    margin-bottom: 10px;
  }

  .fog-alert-text {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.8;
  }

  /* ── PROFILE CARD ── */
  .profile-section {
    padding: 0 24px;
    margin-top: 28px;
  }

  .profile-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    overflow: hidden;
    margin-bottom: 14px;
  }

  .profile-card-header {
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    gap: 14px;
  }

  .profile-icon {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: radial-gradient(circle, var(--crimson-light), var(--crimson));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 17px;
    flex-shrink: 0;
  }

  .profile-type-label {
    font-size: 9px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 500;
    margin-bottom: 4px;
  }

  .profile-type-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 400;
    color: var(--text);
    line-height: 1.2;
  }

  .profile-card-body {
    padding: 16px 20px 18px;
  }

  .profile-desc {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.8;
    margin-bottom: 16px;
  }

  .profile-rec-label {
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--crimson);
    font-weight: 500;
    margin-bottom: 8px;
  }

  .profile-rec {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.75;
    font-style: italic;
    padding-left: 12px;
    border-left: 1.5px solid var(--crimson);
  }

  /* ── QUOTE ── */
  .quote-block {
    margin: 24px 24px 0;
    padding: 20px 20px;
    border-left: 2px solid var(--gold);
    background: rgba(200,169,110,0.04);
    border-radius: 0 12px 12px 0;
  }

  .quote-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-style: italic;
    font-weight: 300;
    color: var(--gold-light);
    line-height: 1.55;
  }

  /* ── GROWTH SECTION ── */
  .growth-section {
    padding: 0 24px;
    margin-top: 28px;
  }

  .growth-section .section-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    font-weight: 300;
    color: var(--text);
    margin-bottom: 16px;
  }

  .growth-section .section-num {
    font-size: 10px;
    color: var(--crimson);
    letter-spacing: 2px;
    font-weight: 500;
    margin-bottom: 6px;
  }

  /* ── RESTART ── */
  .restart-btn {
    display: block;
    margin: 40px 24px 0;
    padding: 16px;
    text-align: center;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: 'Montserrat', sans-serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 30px;
    transition: all 0.3s ease;
    width: calc(100% - 48px);
  }

  .restart-btn:hover {
    border-color: var(--crimson);
    color: var(--text);
  }
</style>
</head>

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

let questions = [];
let current = 0;
let answers = {};

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function startTest() {
  questions = shuffle(QUESTIONS);
  current = 0;
  answers = {};
  showScreen('screen-test');
  renderQuestion();
}

function renderQuestion() {
  const q = questions[current];
  const total = questions.length;
  const pct = (current / total) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('questionCounter').textContent = (current + 1) + ' / ' + total;

  const wrap = document.getElementById('questionWrap');
  wrap.innerHTML = `
    <div class="question-num">Утверждение ${current + 1}</div>
    <div class="question-text">${q.text}</div>
    <div class="answer-btns">
      <div class="answer-btn yes" id="btn-yes" onclick="answer(true)">
        <span class="btn-icon">✓</span>
        <span class="btn-label">Правильно</span>
      </div>
      <div class="answer-btn no" id="btn-no" onclick="answer(false)">
        <span class="btn-icon">✗</span>
        <span class="btn-label">Неправильно</span>
      </div>
    </div>
  `;
  wrap.style.animation = 'none';
  void wrap.offsetHeight;
  wrap.style.animation = 'fadeUp 0.38s ease';
}

function answer(val) {
  const btnId = val ? 'btn-yes' : 'btn-no';
  const btn = document.getElementById(btnId);
  btn.classList.add('flash');
  answers[questions[current].id] = val;
  setTimeout(() => {
    current++;
    if (current >= questions.length) showResults();
    else renderQuestion();
  }, 220);
}

function calcScore(block) {
  return QUESTIONS.filter(q => q.block === block && answers[q.id] === true).length;
}

function getProfile(m, e, b, bal, fog) {
  if (fog >= 12) return 'fog';
  if (bal >= 8) return 'integrated';
  if (m >= 16 && e < 14 && b < 12) return 'mental-dominant';
  if (e >= 17 && m < 14) return 'emotional-dominant';
  if (b >= 16 && m < 12) return 'body-dominant';
  if (m >= 14 && e >= 15) return 'mental-emotional';
  if (m >= 13 && b < 10) return 'mental-disconnected';
  if (e >= 14 && b < 10) return 'emotional-ungrounded';
  return 'developing';
}

        <div class="score-num">${bal}</div>
        <div class="score-total">из 10</div>
      </div>
    </div>
  `;

  const html = `
    <div class="results-cover">
      <div class="results-tag">Энергоментальная терапия · Результат</div>

    ${fogHtml}

    <div class="scores-section">
      <div class="section-label">Твои результаты</div>
      ${scoresHtml}
      ${balCardHtml}
    </div>

    <div class="profile-section">

        </div>
        <div class="profile-card-body">
          <div class="profile-desc">${profile.desc}</div>

          <div class="profile-rec">${profile.rec}</div>
        </div>
      </div>
    </div>

    <div class="quote-block">
      <div class="quote-text">«Когда все три уровня согласованы — энергия течёт. Нужные люди, события и возможности притягиваются сами.»</div>
    </div>

    <div class="growth-section">

    </div>

    <button class="restart-btn" onclick="startTest()">Пройти тест заново</button>

  document.getElementById('resultsWrap').innerHTML = html;
  showScreen('screen-results');
}
</script>
